<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Field Manual — French Translation</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
  <style>
    :root {
      --cream: #FBF5EA; --surface: #FFF9F1; --surface2: #EEF0DE;
      --border: #D8CCB8; --sage: #9BA85A; --moss: #7C8450;
      --terracotta: #D98B3A; --amber: #E9B85C;
      --text: #5D472F; --text2: #7B6750; --text3: #9B8A76;
      --error: #C97A63; --success: #8FAF6B;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--cream); font-family: 'DM Sans', sans-serif; color: var(--text); min-height: 100vh; }

    header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 18px 40px; display: flex; align-items: center; justify-content: space-between; }
    .logo { font-family: 'Cormorant Garamond', serif; font-size: 20px; font-weight: 600; }
    .logo span { color: var(--terracotta); }
    .subtitle { font-size: 11px; color: var(--text3); letter-spacing: 0.08em; text-transform: uppercase; }

    main { max-width: 820px; margin: 0 auto; padding: 36px 24px 80px; }

    .upload-zone { border: 2px dashed var(--border); border-radius: 16px; padding: 48px 32px; text-align: center; background: var(--surface); cursor: pointer; transition: border-color 0.2s, background 0.2s; position: relative; }
    .upload-zone:hover, .upload-zone.drag { border-color: var(--sage); background: var(--surface2); }
    .upload-zone input[type=file] { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
    .upload-icon { width: 48px; height: 48px; background: var(--surface2); border-radius: 12px; display: flex; align-items: center; justify-content: center; margin: 0 auto 14px; font-size: 22px; }
    .upload-title { font-family: 'Cormorant Garamond', serif; font-size: 20px; font-weight: 500; margin-bottom: 6px; }
    .upload-hint { font-size: 13px; color: var(--text3); }

    .file-info { display: none; background: var(--surface2); border: 1px solid var(--border); border-radius: 12px; padding: 13px 18px; margin-top: 14px; align-items: center; gap: 12px; }
    .file-info.visible { display: flex; }
    .file-name { font-size: 14px; font-weight: 500; flex: 1; }
    .word-count { font-size: 12px; padding: 3px 10px; border-radius: 20px; font-weight: 500; flex-shrink: 0; }
    .wc-ok { background: #EAF3DE; color: #3B6D11; }
    .wc-warn { background: #FAEEDA; color: #854F0B; }
    .wc-over { background: #FCEAE7; color: #993C1D; }

    .progress-wrap { margin-top: 28px; display: none; }
    .progress-wrap.visible { display: block; }

    .passes { display: flex; gap: 10px; margin-bottom: 18px; }
    .pass-badge { flex: 1; padding: 10px 14px; border-radius: 10px; border: 1px solid var(--border); background: var(--surface); }
    .pass-title { font-size: 12px; font-weight: 500; color: var(--text2); margin-bottom: 2px; }
    .pass-desc { font-size: 11px; color: var(--text3); }
    .pass-badge.active { border-color: var(--amber); background: #FAEEDA; }
    .pass-badge.active .pass-title { color: #854F0B; }
    .pass-badge.active .pass-desc { color: #A06020; }
    .pass-badge.done { border-color: var(--success); background: #EAF3DE; }
    .pass-badge.done .pass-title { color: #3B6D11; }
    .pass-badge.done .pass-desc { color: #4A8020; }

    .progress-header { display: flex; justify-content: space-between; margin-bottom: 7px; }
    .progress-label { font-size: 13px; font-weight: 500; }
    .progress-pct { font-size: 13px; color: var(--text3); }
    .progress-bar { height: 5px; background: var(--border); border-radius: 3px; overflow: hidden; margin-bottom: 16px; }
    .progress-fill { height: 100%; background: var(--terracotta); border-radius: 3px; transition: width 0.35s ease; width: 0%; }

    .page-grid { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 4px; }
    .page-chip { width: 42px; height: 26px; border-radius: 6px; background: var(--surface2); border: 1px solid var(--border); font-size: 10px; color: var(--text3); display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
    .page-chip.running { background: #FAEEDA; border-color: var(--amber); color: #854F0B; }
    .page-chip.done { background: #EAF3DE; border-color: var(--success); color: #3B6D11; }
    .page-chip.error { background: #FCEAE7; border-color: var(--error); color: #993C1D; }

    .actions { display: flex; gap: 10px; margin-top: 24px; }
    .btn { padding: 12px 26px; border-radius: 10px; font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500; cursor: pointer; border: none; transition: all 0.18s; display: flex; align-items: center; gap: 8px; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-primary { background: var(--terracotta); color: white; flex: 1; justify-content: center; }
    .btn-primary:hover:not(:disabled) { background: #c4792e; }
    .btn-export { background: var(--sage); color: white; display: none; }
    .btn-export.visible { display: flex; }
    .btn-export:hover { background: var(--moss); }
    .btn-reset { background: var(--surface2); color: var(--text2); border: 1px solid var(--border); }
    .btn-reset:hover { background: var(--border); }

    .result-panel { display: none; margin-top: 28px; background: var(--surface); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; }
    .result-panel.visible { display: block; }
    .result-header { padding: 14px 20px; border-bottom: 1px solid var(--border); background: var(--surface2); display: flex; justify-content: space-between; align-items: center; }
    .result-title { font-family: 'Cormorant Garamond', serif; font-size: 17px; font-weight: 600; }
    .copy-btn { font-size: 12px; padding: 5px 12px; border: 1px solid var(--border); border-radius: 8px; background: transparent; color: var(--text2); cursor: pointer; }
    .copy-btn:hover { background: var(--border); }
    .result-body { padding: 22px; font-family: 'Cormorant Garamond', serif; font-size: 15px; line-height: 1.9; color: var(--text); white-space: pre-wrap; max-height: 500px; overflow-y: auto; }

    .error-msg { display: none; background: #FCEAE7; border: 1px solid #E8C4B8; border-radius: 10px; padding: 12px 16px; font-size: 13px; color: #993C1D; margin-top: 14px; }
    .error-msg.visible { display: block; }

    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner { width: 13px; height: 13px; border: 2px solid rgba(255,255,255,0.35); border-top-color: white; border-radius: 50%; animation: spin 0.7s linear infinite; }
  </style>
</head>
<body>

<header>
  <div class="logo">Field Manual <span>·</span> Traducteur</div>
  <div class="subtitle">French Translation Pipeline</div>
</header>

<main>
  <div class="upload-zone" id="uploadZone">
    <input type="file" accept=".docx,.txt" id="fileInput" onchange="handleFile(this.files[0])" />
    <div class="upload-icon">📄</div>
    <div class="upload-title">Drop your .docx or .txt chapter here</div>
    <div class="upload-hint">Or click to browse · Max 50,000 words · Translated page by page</div>
  </div>

  <div class="file-info" id="fileInfo">
    <div style="font-size:18px;flex-shrink:0;">📄</div>
    <div class="file-name" id="fileName">—</div>
    <div class="word-count" id="wordCount">—</div>
  </div>

  <div class="error-msg" id="errorMsg"></div>

  <div class="progress-wrap" id="progressWrap">
    <div class="passes">
      <div class="pass-badge" id="pass1"><div class="pass-title">Pass 1</div><div class="pass-desc">Translation</div></div>
      <div class="pass-badge" id="pass2"><div class="pass-title">Pass 2</div><div class="pass-desc">Copy editor</div></div>
      <div class="pass-badge" id="pass3"><div class="pass-title">Pass 3</div><div class="pass-desc">Reader polish</div></div>
    </div>
    <div class="progress-header">
      <div class="progress-label" id="progressLabel">Starting...</div>
      <div class="progress-pct" id="progressPct">0%</div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    <div class="page-grid" id="pageGrid"></div>
  </div>

  <div class="actions">
    <button class="btn btn-primary" id="submitBtn" onclick="runPipeline()" disabled>Translate chapter</button>
    <button class="btn btn-export" id="exportBtn" onclick="exportDoc()">⬇ Export to Word</button>
    <button class="btn btn-reset" onclick="reset()">Reset</button>
  </div>

  <div class="result-panel" id="resultPanel">
    <div class="result-header">
      <div class="result-title">Traduction finale</div>
      <button class="copy-btn" onclick="copyResult()">Copy all</button>
    </div>
    <div class="result-body" id="resultBody"></div>
  </div>
</main>

<script>
const WORDS_PER_PAGE = 450;
let fileText = '';
let pages = [];
let finalTranslation = '';

const zone = document.getElementById('uploadZone');
zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('drag'); });
zone.addEventListener('dragleave', () => zone.classList.remove('drag'));
zone.addEventListener('drop', e => { e.preventDefault(); zone.classList.remove('drag'); if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]); });

async function handleFile(file) {
  showError('');
  if (file.name.endsWith('.docx')) {
    const buf = await file.arrayBuffer();
    fileText = (await mammoth.extractRawText({ arrayBuffer: buf })).value;
  } else {
    fileText = await file.text();
  }
  const words = fileText.trim().split(/\s+/).filter(Boolean).length;
  const pageCount = Math.ceil(words / WORDS_PER_PAGE);
  document.getElementById('fileName').textContent = file.name;
  const wc = document.getElementById('wordCount');
  document.getElementById('fileInfo').classList.add('visible');
  if (words > 50000) {
    wc.textContent = `${words.toLocaleString()} words — over limit`;
    wc.className = 'word-count wc-over';
    document.getElementById('submitBtn').disabled = true;
    showError(`${words.toLocaleString()} words exceeds the 50,000 word limit. Please upload one chapter at a time.`);
  } else {
    wc.textContent = `${words.toLocaleString()} words · ~${pageCount} pages`;
    wc.className = `word-count ${words > 40000 ? 'wc-warn' : 'wc-ok'}`;
    document.getElementById('submitBtn').disabled = false;
  }
}

function sliceIntoPages(text) {
  const paragraphs = text.split(/\n+/).filter(p => p.trim());
  const result = [];
  let current = [], wordCount = 0;
  for (const para of paragraphs) {
    const words = para.split(/\s+/).length;
    if (wordCount + words > WORDS_PER_PAGE && current.length > 0) {
      result.push(current.join('\n\n'));
      current = []; wordCount = 0;
    }
    current.push(para);
    wordCount += words;
  }
  if (current.length) result.push(current.join('\n\n'));
  return result;
}

function buildPageGrid(count) {
  const grid = document.getElementById('pageGrid');
  grid.innerHTML = '';
  for (let i = 0; i < count; i++) {
    const chip = document.createElement('div');
    chip.className = 'page-chip';
    chip.id = `chip-${i}`;
    chip.textContent = `P${i + 1}`;
    grid.appendChild(chip);
  }
}

function setChip(i, state) { const c = document.getElementById(`chip-${i}`); if (c) c.className = `page-chip ${state}`; }
function setPass(n, state) { document.getElementById(`pass${n}`).className = `pass-badge ${state}`; }
function setProgress(label, pct) {
  document.getElementById('progressLabel').textContent = label;
  document.getElementById('progressPct').textContent = `${Math.round(pct)}%`;
  document.getElementById('progressFill').style.width = pct + '%';
}
function showError(msg) { const el = document.getElementById('errorMsg'); el.textContent = msg; el.classList.toggle('visible', !!msg); }

async function callAPI(text, pass) {
  const res = await fetch('/api/translate', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ text, pass })
  });
  const raw = await res.text();
  let data;
  try { data = JSON.parse(raw); } catch { throw new Error(`Server error (HTTP ${res.status}): ${raw.slice(0, 150)}`); }
  if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);
  if (!data.result) throw new Error(data.error || 'No result');
  return data.result;
}

async function translatePages(pageList, pass, label, pStart, pEnd) {
  const results = [];
  for (let i = 0; i < pageList.length; i++) {
    setChip(i, 'running');
    setProgress(`${label} — page ${i + 1} of ${pageList.length}`, pStart + (i / pageList.length) * (pEnd - pStart));
    try {
      results.push(await callAPI(pageList[i], pass));
      setChip(i, 'done');
    } catch (err) {
      setChip(i, 'error');
      throw new Error(`Pass ${pass}, page ${i + 1}: ${err.message}`);
    }
  }
  return results;
}

async function runPipeline() {
  if (!fileText) return;
  showError(''); finalTranslation = '';
  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.innerHTML = '<div class="spinner"></div> Translating...';

  pages = sliceIntoPages(fileText);
  buildPageGrid(pages.length);
  document.getElementById('progressWrap').classList.add('visible');
  document.getElementById('resultPanel').classList.remove('visible');
  document.getElementById('exportBtn').classList.remove('visible');
  setProgress('Starting...', 2);

  try {
    setPass(1, 'active'); setPass(2, ''); setPass(3, '');
    const v1 = await translatePages(pages, 1, 'Pass 1 — Translating', 2, 40);
    setPass(1, 'done');

    setPass(2, 'active');
    const v2 = await translatePages(v1, 2, 'Pass 2 — Copy editing', 40, 70);
    setPass(2, 'done');

    setPass(3, 'active');
    const v3 = await translatePages(v2, 3, 'Pass 3 — Polishing', 70, 98);
    setPass(3, 'done');

    finalTranslation = v3.join('\n\n');
    setProgress('Complete', 100);

    document.getElementById('resultBody').textContent = finalTranslation;
    document.getElementById('resultPanel').classList.add('visible');
    document.getElementById('exportBtn').classList.add('visible');
    btn.textContent = 'Translation complete ✓';
  } catch (err) {
    showError(err.message);
    btn.disabled = false;
    btn.textContent = 'Retry';
  }
}

function exportDoc() {
  if (!finalTranslation) return;
  let html = `<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:w="urn:schemas-microsoft-com:office:word" xmlns="http://www.w3.org/TR/REC-html40"><head><meta charset="utf-8"><style>body{font-family:Garamond,serif;font-size:11pt;line-height:1.8;margin:2.5cm;color:#3a2a1a;}p{margin:0 0 9pt;}.mk{background:#FDF3D0;color:#854F0B;font-family:monospace;font-size:9pt;padding:1pt 3pt;}</style></head><body>`;
  finalTranslation.split('\n').forEach(line => {
    const t = line.trim();
    if (!t) { html += '<p>&nbsp;</p>'; return; }
    html += `<p>${t.replace(/⟦(IMG_\d+)⟧/g, '<span class="mk">⟦$1⟧</span>')}</p>`;
  });
  html += '</body></html>';
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob(['\ufeff', html], { type: 'application/msword' }));
  a.download = 'field-manual-french.doc';
  a.click();
}

function copyResult() {
  navigator.clipboard.writeText(finalTranslation);
  const b = document.querySelector('.copy-btn');
  b.textContent = 'Copied!';
  setTimeout(() => b.textContent = 'Copy all', 2000);
}

function reset() {
  fileText = ''; pages = []; finalTranslation = '';
  document.getElementById('fileInfo').classList.remove('visible');
  document.getElementById('progressWrap').classList.remove('visible');
  document.getElementById('resultPanel').classList.remove('visible');
  document.getElementById('exportBtn').classList.remove('visible');
  document.getElementById('submitBtn').disabled = true;
  document.getElementById('submitBtn').textContent = 'Translate chapter';
  document.getElementById('fileInput').value = '';
  document.getElementById('pageGrid').innerHTML = '';
  showError('');
  [1,2,3].forEach(n => setPass(n, ''));
}
</script>
</body>
</html>
